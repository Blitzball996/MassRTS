// MassRTS Game Configuration
// Edit this file to change game balance, keybinds, and settings
// Changes take effect on next game start

[Display]
window_width = 1600
window_height = 900
fullscreen = false
vsync = true
target_fps = 60

[Camera]
scroll_speed = 800
zoom_speed = 50
min_zoom = 100
max_zoom = 2000

[Keybinds]
// Shop slots (number keys)
buy_slot_1 = 1
buy_slot_2 = 2
buy_slot_3 = 3
buy_slot_4 = 4
buy_slot_5 = 5
buy_slot_6 = 6
buy_slot_7 = 7
buy_slot_8 = 8
buy_slot_9 = 9
// Game controls
pause = P
speed_up = PLUS
speed_down = MINUS
select_all = A
deselect = ESCAPE
// Map switching (numpad)
map_plains = NUMPAD_1
map_desert = NUMPAD_2
map_forest = NUMPAD_3
map_islands = NUMPAD_4
map_mountain = NUMPAD_5
map_random = NUMPAD_0

[Balance]
// Starting money per faction
starting_money_red = 5000
starting_money_blue = 5000
// Passive income per second
income_rate = 50
// Score to win
win_score = 200

[Units]
// Format: name, cost, hp, damage, range, speed, scale
//       type_id: Infantry=0, Cavalry=1, Archer=2, Bomber=3, Artillery=4, Shield=5, Samurai=6, Militia=7
militia_cost = 20
militia_hp = 60
militia_damage = 6
militia_range = 6
militia_speed = 5

infantry_cost = 50
infantry_hp = 100
infantry_damage = 10
infantry_range = 8
infantry_speed = 6

archer_cost = 60
archer_hp = 60
archer_damage = 12
archer_range = 100
archer_speed = 4

shield_cost = 80
shield_hp = 200
shield_damage = 8
shield_range = 6
shield_speed = 4

cavalry_cost = 120
cavalry_hp = 150
cavalry_damage = 18
cavalry_range = 8
cavalry_speed = 12

bomber_cost = 100
bomber_hp = 80
bomber_damage = 80
bomber_range = 12
bomber_speed = 7

artillery_cost = 200
artillery_hp = 70
artillery_damage = 40
artillery_range = 200
artillery_speed = 2

wall_cost = 30
wall_hp = 500
wall_damage = 0
wall_range = 0
wall_speed = 0

turret_cost = 150
turret_hp = 300
turret_damage = 25
