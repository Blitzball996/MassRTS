[AI]
// Enemy AI budget per wave
ai_budget_base = 500
ai_budget_growth = 100
ai_aggression = 0.7
// Search range for target finding
target_search_range = 500
artillery_search_range = 600
// Retreat threshold (% of max health)
retreat_threshold = 0.2
shield_retreat_threshold = 0.1

[Maps]
// Available maps (numpad keys to switch)
// 1=Plains (flat, open)
// 2=Desert (sandy, sparse cover)
// 3=Forest (trees, slow terrain)
// 4=Islands (water channels)
// 5=Mountain (height advantage)
// 0=Random
current_map = 1

[Info]
// Quick reference:
// Left click = Select units
// Right click = Move selected units
// Number keys = Buy units from shop
// Numpad keys = Switch map
// P = Pause
// +/- = Game speed
// ESC = Deselect
// A = Select all your units
